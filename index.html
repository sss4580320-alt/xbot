<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>X Bot Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
  --border: #2a2a2a; --border2: #3a3a3a;
  --text: #f0f0f0; --text2: #888; --text3: #555;
  --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.12); --accent-text: #1a1a00;
  --red: #ff4757; --green: #2ed573;
  --radius: 12px; --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; padding-top: max(14px, env(safe-area-inset-top, 14px)); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 17px; height: 17px; fill: var(--accent-text); }
.logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
.logo-text span { color: var(--accent); }
.header-right { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px calc(80px + var(--safe-bottom)); }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); z-index: 50; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; cursor: pointer; color: var(--text3); font-size: 10px; font-weight: 600; }
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 20px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
.card-badge { font-size: 10px; font-weight: 600; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(232,255,71,0.25); border-radius: 4px; padding: 2px 7px; }
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 15px; color: var(--text); font-family: 'Syne', sans-serif; outline: none; -webkit-appearance: none; }
.field input[type="password"] { font-family: 'IBM Plex Mono', monospace; font-size: 14px; }
.field input::placeholder { color: var(--text3); }
.field textarea { resize: none; min-height: 80px; line-height: 1.5; }
.btn { padding: 12px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'Syne', sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; -webkit-appearance: none; }
.btn:active { transform: scale(0.96); }
.btn-accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.btn-full { width: 100%; padding: 14px; font-size: 15px; }
.btn-sm { padding: 8px 12px; font-size: 13px; }
.btn-ghost { background: none; border-color: transparent; color: var(--text2); }
.btn-danger { background: none; border-color: var(--red); color: var(--red); }
.btn-row { display: flex; gap: 8px; }
.alert { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
.alert.success { background: rgba(46,213,115,0.1); border: 1px solid rgba(46,213,115,0.3); color: var(--green); display: block; }
.alert.error { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: var(--red); display: block; }
.post-list { display: flex; flex-direction: column; gap: 10px; }
.post-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
.post-card.past { opacity: 0.4; }
.post-card-top { display: flex; gap: 8px; margin-bottom: 8px; }
.post-card-top input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; color: var(--text); font-family: 'IBM Plex Mono', monospace; outline: none; -webkit-appearance: none; }
.post-card select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; outline: none; -webkit-appearance: none; margin-bottom: 8px; }
.post-card textarea { width: 100%; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'Syne', sans-serif; resize: none; min-height: 44px; line-height: 1.5; margin-bottom: 8px; }
.post-card-bottom { display: flex; justify-content: flex-end; }
.account-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; overflow: hidden; }
.account-header { display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer; }
.account-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
.account-info { flex: 1; }
.account-name { font-size: 15px; font-weight: 600; }
.account-sub { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.account-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.account-dot.ok { background: var(--green); box-shadow: 0 0 4px var(--green); }
.chevron { color: var(--text3); font-size: 12px; transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }
.account-body { padding: 0 14px 14px; display: none; }
.account-body.open { display: block; }
.add-form { background: var(--surface2); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px; display: none; }
.add-form.open { display: block; }
.add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.add-form-grid input, .add-form-grid select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 14px; color: var(--text); font-family: 'IBM Plex Mono', monospace; outline: none; -webkit-appearance: none; width: 100%; }
.add-form textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 14px; color: var(--text); font-family: 'Syne', sans-serif; resize: none; outline: none; min-height: 80px; margin-bottom: 10px; }
.ai-result { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.ai-result-text { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal-sheet { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px; padding-bottom: calc(20px + var(--safe-bottom)); width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.modal-grid input, .modal-grid select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 14px; color: var(--text); font-family: 'IBM Plex Mono', monospace; outline: none; -webkit-appearance: none; width: 100%; }
.modal-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 14px; color: var(--text); font-family: 'Syne', sans-serif; resize: none; outline: none; min-height: 160px; margin-bottom: 12px; line-height: 1.6; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid var(--text3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
.loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
input[type="date"]::-webkit-calendar-picker-indicator, input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      <div class="logo-text">X Bot <span>Manager</span></div>
    </div>
    <div class="header-right" id="headerInfo">読み込み中...</div>
  </div>

  <div class="content" id="mainContent">
    <div id="alertBox" class="alert"></div>

    <div id="tab-schedule">
      <div class="stats">
        <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">合計予約</div></div>
        <div class="stat"><div class="stat-num" id="statUpcoming">0</div><div class="stat-label">残り投稿</div></div>
        <div class="stat"><div class="stat-num" id="statDays">0</div><div class="stat-label">投稿日数</div></div>
        <div class="stat"><div class="stat-num" id="statAccounts">0</div><div class="stat-label">アカウント</div></div>
      </div>
      <div class="btn-row" style="margin-bottom:12px;">
        <button class="btn btn-accent btn-sm" onclick="toggleAddForm()" style="flex:1;">+ 1件追加</button>
        <button class="btn btn-sm" onclick="openBulkModal()" style="flex:1;">まとめて追加</button>
        <button class="btn btn-sm btn-ghost" onclick="sortPosts()">並べ替え</button>
      </div>
      <div class="add-form" id="addForm">
        <div class="add-form-grid">
          <div><input type="date" id="qaDate"></div>
          <div><input type="time" id="qaTime" value="09:00"></div>
          <div style="grid-column:1/-1;"><select id="qaAccount"></select></div>
        </div>
        <textarea id="qaText" placeholder="投稿テキストを入力..."></textarea>
        <div class="btn-row">
          <button class="btn btn-accent btn-sm" onclick="confirmAdd()" style="flex:1;">追加する</button>
          <button class="btn btn-sm btn-ghost" onclick="toggleAddForm()">キャンセル</button>
        </div>
      </div>
      <div id="postList" class="post-list"></div>
      <div id="emptyState" style="text-align:center;padding:3rem 0;color:var(--text3);font-size:14px;display:none;">まだ予約投稿がありません</div>
    </div>

    <div id="tab-accounts" style="display:none;">
      <div id="alertBox2" class="alert"></div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">最大10アカウントまで登録できます。</p>
      <div id="accountsList"></div>
      <button class="btn btn-accent btn-full" onclick="addAccount()" id="addAcctBtn">+ アカウントを追加</button>
    </div>

    <div id="tab-ai" style="display:none;">
      <div class="card">
        <div class="card-header">
          <div class="card-title">AIツイート生成</div>
          <div class="card-badge">Claude</div>
        </div>
        <div class="field"><label>キャラクター設定</label><input type="text" id="aiPrompt" placeholder="例：人妻キャラ、フレンドリーな口調"></div>
        <div class="field">
          <label>生成件数</label>
          <select id="aiCount" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:15px;color:var(--text);width:100%;-webkit-appearance:none;">
            <option value="5">5件</option><option value="10" selected>10件</option><option value="20">20件</option><option value="31">31件（1ヶ月分）</option>
          </select>
        </div>
        <button class="btn btn-accent btn-full" onclick="generateTweets()" id="aiGenBtn"><span id="aiGenBtnText">生成する</span></button>
      </div>
      <div id="aiResults"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('schedule')" id="nav-schedule"><div class="nav-icon">📅</div><div>予約投稿</div></div>
    <div class="nav-item" onclick="switchTab('accounts')" id="nav-accounts"><div class="nav-icon">👤</div><div>アカウント</div></div>
    <div class="nav-item" onclick="switchTab('ai')" id="nav-ai"><div class="nav-icon">✨</div><div>AI生成</div></div>
  </div>
</div>

<div class="modal-overlay" id="bulkModal" onclick="closeBulkModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">まとめて追加</div>
    <div class="modal-sub">開始日から1日1件ずつ自動でスケジュールします。</div>
    <div class="modal-grid">
      <div><input type="date" id="bulkDate"></div>
      <div><input type="time" id="bulkTime" value="09:00"></div>
      <div style="grid-column:1/-1;"><select id="bulkAccount" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:14px;color:var(--text2);font-family:'IBM Plex Mono',monospace;outline:none;width:100%;-webkit-appearance:none;"></select></div>
    </div>
    <textarea class="modal-textarea" id="bulkText" placeholder="1行1件で入力&#10;&#10;31歳人妻です、採点してください&#10;人妻暇してます&#10;今日も元気です"></textarea>
    <div class="btn-row">
      <button class="btn btn-accent" onclick="confirmBulkAdd()" style="flex:1;">追加する</button>
      <button class="btn btn-ghost" onclick="document.getElementById('bulkModal').classList.remove('open')">キャンセル</button>
    </div>
  </div>
</div>

<script>
let accounts = [];
let posts = [];
let nextPostId = Date.now();
const COLORS = ['#5352ed','#2ed573','#ff6b81','#ffa502','#1e90ff','#eccc68','#ff4757','#a29bfe','#00cec9','#fd79a8'];

function today() { return new Date().toISOString().split('T')[0]; }

async function apiGet(path) { const r = await fetch(path); return r.json(); }
async function apiPost(path, data) { const r = await fetch(path, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.json(); }
async function apiDelete(path) { const r = await fetch(path, {method:'DELETE'}); return r.json(); }

async function init() {
  try {
    const [accts, psts] = await Promise.all([apiGet('/api/accounts'), apiGet('/api/posts')]);
    accounts = accts; posts = psts;
    renderAccounts(); renderPosts(); renderSelects(); updateStats();
  } catch(e) { showAlert('サーバーに接続できません', 'error'); }
}

async function addAccount() {
  if (accounts.length >= 10) { showAlert('最大10アカウントです', 'error'); return; }
  const id = Date.now();
  const num = accounts.length + 1;
  const acct = { id, name: `アカウント${num}`, apiKey:'', apiSecret:'', accessToken:'', accessTokenSecret:'' };
  await apiPost('/api/accounts', acct);
  accounts.push({ id, name: acct.name, hasKeys: false });
  renderAccounts(); renderSelects(); updateStats();
}

async function saveAcct(id) {
  const nameEl = document.querySelector(`[data-acct="${id}"] .acct-name-input`);
  const fields = document.querySelectorAll(`[data-acct="${id}"] .acct-field`);
  const acct = { id, name: nameEl?.value || `アカウント`, apiKey: fields[0]?.value || '', apiSecret: fields[1]?.value || '', accessToken: fields[2]?.value || '', accessTokenSecret: fields[3]?.value || '' };
  await apiPost('/api/accounts', acct);
  const ok = acct.apiKey && acct.apiSecret && acct.accessToken && acct.accessTokenSecret;
  const existing = accounts.find(a => a.id == id);
  if (existing) { existing.name = acct.name; existing.hasKeys = ok; }
  renderAccounts(); renderSelects();
  showAlert2(ok ? `「${acct.name}」を保存しました ✅` : '全てのキーを入力してください', ok ? 'success' : 'error');
}

async function removeAccount(id) {
  if (!confirm('このアカウントを削除しますか？')) return;
  await apiDelete(`/api/accounts/${id}`);
  accounts = accounts.filter(a => a.id != id);
  posts = posts.filter(p => p.accountId != id);
  renderAccounts(); renderSelects(); renderPosts(); updateStats();
}

function renderAccounts() {
  const list = document.getElementById('accountsList');
  list.innerHTML = '';
  accounts.forEach((a, i) => {
    const color = COLORS[i % COLORS.length];
    const el = document.createElement('div');
    el.className = 'account-card'; el.dataset.acct = a.id;
    el.innerHTML = `
      <div class="account-header" onclick="toggleAcct(${a.id})">
        <div class="account-avatar" style="background:${color}22;color:${color};">${(a.name||'?').charAt(0).toUpperCase()}</div>
        <div class="account-info">
          <div class="account-name">${a.name}</div>
          <div class="account-sub"><div class="account-dot ${a.hasKeys?'ok':''}"></div><span>${a.hasKeys?'設定済み':'未設定'}</span></div>
        </div>
        <span class="chevron" id="ch-${a.id}">▾</span>
      </div>
      <div class="account-body" id="ab-${a.id}">
        <div class="field"><label>アカウント名</label><input type="text" class="acct-name-input" value="${a.name}" placeholder="アカウント名"></div>
        <div class="field"><label>API Key</label><input type="password" class="acct-field" placeholder="API Key"></div>
        <div class="field"><label>API Secret</label><input type="password" class="acct-field" placeholder="API Secret"></div>
        <div class="field"><label>Access Token</label><input type="password" class="acct-field" placeholder="Access Token"></div>
        <div class="field"><label>Access Token Secret</label><input type="password" class="acct-field" placeholder="Access Token Secret"></div>
        <div class="btn-row">
          <button class="btn btn-accent btn-sm" onclick="saveAcct(${a.id})" style="flex:1;">保存</button>
          <button class="btn btn-danger btn-sm" onclick="removeAccount(${a.id})">削除</button>
        </div>
      </div>
    `;
    list.appendChild(el);
  });
  document.getElementById('addAcctBtn').style.opacity = accounts.length >= 10 ? '0.4' : '1';
  document.getElementById('headerInfo').textContent = accounts.length + 'アカウント';
}

function toggleAcct(id) {
  document.getElementById('ab-'+id).classList.toggle('open');
  document.getElementById('ch-'+id).classList.toggle('open');
}

function renderSelects() {
  const opts = accounts.length === 0
    ? '<option value="">先にアカウントを追加</option>'
    : accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  ['qaAccount','bulkAccount'].forEach(id => { const el=document.getElementById(id); if(el) el.innerHTML=opts; });
}

async function addPostToServer(post) { await apiPost('/api/posts', post); posts.push(post); }
async function removePost(id) { await apiDelete(`/api/posts/${id}`); posts = posts.filter(p => p.id !== id); renderPosts(); }

function renderPosts() {
  const list = document.getElementById('postList');
  const empty = document.getElementById('emptyState');
  const now = new Date();
  empty.style.display = posts.length === 0 ? 'block' : 'none';
  list.innerHTML = '';
  posts.forEach(p => {
    const isPast = new Date(p.datetime) < now;
    const acctOpts = accounts.map(a=>`<option value="${a.id}" ${a.id==p.accountId?'selected':''}>${a.name}</option>`).join('');
    const card = document.createElement('div');
    card.className = 'post-card' + (isPast?' past':'');
    card.innerHTML = `
      <div class="post-card-top">
        <input type="date" value="${p.datetime?.split(' ')[0]||''}" onchange="updatePostDate(${p.id},this.value)">
        <input type="time" value="${p.datetime?.split(' ')[1]||''}" onchange="updatePostTime(${p.id},this.value)">
      </div>
      ${accounts.length>1?`<select onchange="updatePostAcct(${p.id},this.value)">${acctOpts}</select>`:''}
      <textarea rows="2" oninput="autoResize(this)">${p.text}</textarea>
      <div class="post-card-bottom">
        <button class="btn btn-sm btn-danger" onclick="removePost(${p.id})" style="padding:5px 10px;font-size:12px;">削除</button>
      </div>
    `;
    list.appendChild(card);
  });
  updateStats();
}

function updatePostDate(id, val) { const p=posts.find(p=>p.id===id); if(p){const t=p.datetime?.split(' ')[1]||'09:00'; p.datetime=val+' '+t; apiPost('/api/posts',p);} }
function updatePostTime(id, val) { const p=posts.find(p=>p.id===id); if(p){const d=p.datetime?.split(' ')[0]||today(); p.datetime=d+' '+val; apiPost('/api/posts',p);} }
function updatePostAcct(id, val) { const p=posts.find(p=>p.id===id); if(p){p.accountId=parseInt(val); apiPost('/api/posts',p);} }
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function sortPosts() { posts.sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||'')); renderPosts(); showAlert('日付順に並べました','success'); }

function updateStats() {
  const now = new Date();
  const upcoming = posts.filter(p=>new Date(p.datetime)>=now);
  document.getElementById('statTotal').textContent = posts.length;
  document.getElementById('statUpcoming').textContent = upcoming.length;
  document.getElementById('statDays').textContent = new Set(upcoming.map(p=>p.datetime?.split(' ')[0])).size;
  document.getElementById('statAccounts').textContent = accounts.length;
  document.getElementById('headerInfo').textContent = accounts.length+'アカウント';
}

function toggleAddForm() {
  const f=document.getElementById('addForm');
  f.classList.toggle('open');
  if(f.classList.contains('open')){document.getElementById('qaDate').value=today(); renderSelects(); setTimeout(()=>document.getElementById('qaText').focus(),100);}
}

async function confirmAdd() {
  const date=document.getElementById('qaDate').value, time=document.getElementById('qaTime').value, text=document.getElementById('qaText').value.trim(), acctId=parseInt(document.getElementById('qaAccount').value);
  if(!date||!time||!text){showAlert('日付・時刻・テキストを入力してください','error');return;}
  const post={id:nextPostId++, datetime:date+' '+time, text, accountId:acctId};
  await addPostToServer(post);
  renderPosts(); document.getElementById('addForm').classList.remove('open'); showAlert('追加しました','success');
}

function openBulkModal(){document.getElementById('bulkDate').value=today(); renderSelects(); document.getElementById('bulkModal').classList.add('open');}
function closeBulkModal(e){if(e.target===document.getElementById('bulkModal'))document.getElementById('bulkModal').classList.remove('open');}

async function confirmBulkAdd() {
  const date=document.getElementById('bulkDate').value, time=document.getElementById('bulkTime').value, raw=document.getElementById('bulkText').value, acctId=parseInt(document.getElementById('bulkAccount').value);
  if(!date||!raw.trim()){showAlert('日付とテキストを入力してください','error');return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  let d=new Date(date+'T12:00:00');
  const newPosts=[];
  lines.forEach(text=>{
    const p={id:nextPostId++, datetime:d.toISOString().split('T')[0]+' '+time, text, accountId:acctId};
    newPosts.push(p); posts.push(p); d.setDate(d.getDate()+1);
  });
  await fetch('/api/posts/bulk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newPosts)});
  renderPosts(); document.getElementById('bulkModal').classList.remove('open'); showAlert(lines.length+'件追加しました','success');
}

function switchTab(name) {
  ['schedule','accounts','ai'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
    document.getElementById('nav-'+t).classList.toggle('active',t===name);
  });
  document.getElementById('mainContent').scrollTop=0;
}

async function generateTweets() {
  const prompt=document.getElementById('aiPrompt').value.trim();
  if(!prompt){showAlert('キャラクター設定を入力してください','error');return;}
  const count=document.getElementById('aiCount').value;
  const btn=document.getElementById('aiGenBtn'), txt=document.getElementById('aiGenBtnText');
  txt.innerHTML='<div class="spinner"></div>'; btn.disabled=true;
  const resEl=document.getElementById('aiResults');
  resEl.innerHTML='<div class="loading">生成中...</div>';
  try {
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,count})});
    const data=await res.json();
    const lines=(data.text||'').split('\n').filter(l=>/^\d+\./.test(l.trim()));
    resEl.innerHTML='';
    lines.forEach(line=>{
      const content=line.replace(/^\d+\.\s*/,'').trim();
      const el=document.createElement('div'); el.className='ai-result';
      el.innerHTML=`<div class="ai-result-text">${content}</div><button class="btn btn-accent btn-sm btn-full" onclick="addAiPost(this)" data-text="${content.replace(/"/g,'&quot;')}">予約リストに追加</button>`;
      resEl.appendChild(el);
    });
    if(!lines.length) resEl.innerHTML='<div class="loading">生成できませんでした。</div>';
  } catch(e){ resEl.innerHTML='<div class="loading" style="color:var(--red)">エラーが発生しました。</div>'; }
  txt.textContent='生成する'; btn.disabled=false;
}

async function addAiPost(btn) {
  const text=btn.getAttribute('data-text');
  const last=posts.slice().sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||'')).pop();
  let nextDate=today();
  if(last){ const d=new Date(last.datetime); d.setDate(d.getDate()+1); nextDate=d.toISOString().split('T')[0]; }
  const post={id:nextPostId++, datetime:nextDate+' 09:00', text, accountId:accounts[0]?.id||null};
  await addPostToServer(post);
  renderPosts(); switchTab('schedule'); showAlert('予約リストに追加しました','success');
}

function showAlert(msg,type){_alert('alertBox',msg,type);}
function showAlert2(msg,type){_alert('alertBox2',msg,type);}
function _alert(id,msg,type){const el=document.getElementById(id); el.className='alert '+type; el.textContent=msg; setTimeout(()=>{el.className='alert';},3000);}

init();
</script>
